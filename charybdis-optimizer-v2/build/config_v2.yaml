evolution:
  pop_size: 500
  n_generations: 999999
  crossover_prob: 0.7
  mutation_prob: 0.15
  seed: 42
  inject_seed: false
surrogate:
  enabled: false
  hidden_dim: 256
  embedding_dim: 32
  batch_size: 256
  compile: true
  mixed_precision: true
  retrain_every: 25
  exact_eval_every: 25
  n_initial_samples: 1000
  surrogate_epochs: 50
exact_eval:
  batch_size: 50
  use_numba: true
  parity_tolerance: 1e-4
fitness:
  weights:
    effort: 1.0
    adjacency: 1.5
    finger_balance: 0.8
    same_finger: 2.0
    violations: 50.0
    workflow_coherence: 30.0
    trackball_proximity: 5.0
    app_coherence: 5.0
    learning_curve: 0.5
  shortcut_importance_overrides:
    LeftArrow: 3.0
    RightArrow: 3.0
    UpArrow: 3.0
    DownArrow: 3.0
  missing_important_threshold: 6.0
  violation_sub_weights:
    duplicate: 10.0
    l0_displacement: 50.0
    missing_important: 5000000.0
    cross_layer_duplicate: 8.0
    group_split: 200.0
    thumb_occupancy: 200.0
    arrow_order: 500000.0
    hand_bias: 2000.0
    mouse_layer_access: 5000.0
    arrow_scattered: 5000000.0
    layer7_unreachable: 50000000.0
output:
  build_dir: "build"
  checkpoint_interval: 500
  verbose: true
